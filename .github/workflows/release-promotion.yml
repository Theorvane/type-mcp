name: release-promotion

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-promotion:
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Require dev or an issue-numbered release branch
        shell: bash
        run: |
          [[ "$HEAD_REF" == "dev" || "$HEAD_REF" =~ ^release/[1-9][0-9]*-[a-z0-9][a-z0-9-]*$ ]]
