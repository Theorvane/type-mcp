name: Request AI pull-request review

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-ai-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request a fresh AI review
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            if (pullRequest.draft) {
              core.info("Draft pull request; review request skipped.");
              return;
            }

            const reviewer =
              pullRequest.user.login === "sjungwon03-ai" ? "sjungwon03" : "sjungwon03-ai";

            const alreadyRequested = pullRequest.requested_reviewers.some(
              ({ login }) => login === reviewer,
            );
            if (alreadyRequested) {
              core.info(`${reviewer} is already requested on this pull request.`);
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              reviewers: [reviewer],
            });
            core.info(`Requested review from ${reviewer}.`);
